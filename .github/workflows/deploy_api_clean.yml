name: Deploy API to Azure (clean)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build clean .python_packages
        run: |
          python -m pip install --upgrade pip
          rm -rf .python_packages backend-clean.zip
          mkdir -p .python_packages/lib/site-packages
          pip install -r requirements.txt --target .python_packages/lib/site-packages

      - name: Build deployment archive
        run: |
          python - <<'PY'
          import os, zipfile
          exclude_dirs={'.git','venv','.venv','antenv','__pycache__','.pytest_cache','.mypy_cache','.ruff_cache','.idea','.vscode','storage'}
          exclude_names={'.env','backend','.gitignore.txt','backend-clean.zip'}
          exclude_ext={'.pyc','.pyo','.pyd','.db','.sqlite','.sqlite3'}
          with zipfile.ZipFile('backend-clean.zip','w',zipfile.ZIP_DEFLATED) as z:
              for root, dirs, files in os.walk('.'):
                  rel=os.path.relpath(root,'.')
                  parts=set(rel.split(os.sep))
                  dirs[:] = [d for d in dirs if d not in exclude_dirs]
                  if 'storage' in parts or '.git' in parts:
                      dirs[:] = []
                      continue
                  for f in files:
                      if f in exclude_names or any(f.endswith(ext) for ext in exclude_ext):
                          continue
                      path=os.path.join(root,f)
                      arc=os.path.relpath(path,'.')
                      z.write(path, arc)
          PY

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_41E1D00167544F6A807B419551CCECB3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FFB7FC8230AD46C6828A3FEDCF4B7DF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_25FA83492B05466B9358CD02B735D72A }}

      - name: Set startup command
        run: |
          az webapp config set             --resource-group rg-nen1090             --name nen1090-api-prod             --startup-file 'export PYTHONPATH=/home/site/wwwroot/.python_packages/lib/site-packages:$PYTHONPATH && gunicorn -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120'

      - name: Clean zip deploy
        run: |
          az webapp deploy             --resource-group rg-nen1090             --name nen1090-api-prod             --src-path backend-clean.zip             --type zip             --clean true             --restart true

      - name: Restart webapp
        run: |
          az webapp restart --resource-group rg-nen1090 --name nen1090-api-prod
