
name: API CI + Azure Deploy (Production)

on:
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'alembic.ini'
      - '.github/workflows/api_ci_production.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Syntax check
        run: python -m compileall app main.py
      - name: Smoke import
        run: |
          python - <<'PY2'
from app.main import app
print(app.title)
PY2

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build deployment zip
        run: |
          python - <<'PY2'
import os, zipfile
exclude_dirs={'.git','venv','.venv','__pycache__','.pytest_cache','.mypy_cache','.ruff_cache','.idea','.vscode'}
exclude_ext={'.pyc','.pyo','.pyd'}
with zipfile.ZipFile('backend-production.zip','w',zipfile.ZIP_DEFLATED) as z:
    for root, dirs, files in os.walk('.'):
        dirs[:] = [d for d in dirs if d not in exclude_dirs]
        for f in files:
            if any(f.endswith(ext) for ext in exclude_ext):
                continue
            path=os.path.join(root,f)
            z.write(path, os.path.relpath(path,'.'))
PY2
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: nen1090-api-prod
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: backend-production.zip
