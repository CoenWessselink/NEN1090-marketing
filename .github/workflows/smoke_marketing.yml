name: Smoke Test Marketing

on:
  workflow_run:
    workflows: ["Deploy Marketing to Cloudflare Pages"]
    types: [completed]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check homepage
        run: curl -fL "${{ vars.MARKETING_URL }}/" || exit 1

      - name: Check pricing
        run: curl -fL "${{ vars.MARKETING_URL }}/pricing.html" || exit 1

      - name: Check robots.txt
        run: curl -fL "${{ vars.MARKETING_URL }}/robots.txt" || exit 1
