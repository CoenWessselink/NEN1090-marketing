name: Build and deploy Python app to Azure Web App - nen1090-api-prod

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Installeer dependencies DIRECT in .python_packages (root)
      - name: Install dependencies into .python_packages
        run: |
          python -m pip install --upgrade pip
          rm -rf .python_packages
          mkdir -p .python_packages
          pip install -r requirements.txt --target=".python_packages"

      # Maak deploy zip (NEEM .python_packages mee!)
      - name: Create deployment package (app.zip)
        run: |
          rm -f app.zip
          zip -r app.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "**/__pycache__/*" \
            -x "**/*.pyc" \
            -x "venv/*" \
            -x ".venv/*" \
            -x "antenv/*" \
            -x "*.PublishSettings"

      # Optioneel: upload artifact zodat je kunt downloaden/inspecteren
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-zip
          path: app.zip

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: nen1090-api-prod
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: app.zip
