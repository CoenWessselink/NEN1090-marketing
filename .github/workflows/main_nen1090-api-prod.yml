name: Build and deploy Python app to Azure Web App - nen1090-api-prod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies into .python_packages (Azure layout)
        run: |
          python -m pip install --upgrade pip
          rm -rf .python_packages
          mkdir -p .python_packages/lib/site-packages
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Sanity check imports (must succeed)
        run: |
          PYTHONPATH="${{ github.workspace }}/.python_packages/lib/site-packages" \
          python -c "import fastapi, uvicorn, gunicorn; print('imports OK')"

      - name: Create deployment package (app.zip)
        run: |
          rm -f app.zip
          zip -r app.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "**/__pycache__/*" \
            -x "**/*.pyc" \
            -x "venv/*" \
            -x ".venv/*" \
            -x "antenv/*"

      - name: List zip contents (debug)
        run: |
          unzip -l app.zip | head -n 200
          unzip -l app.zip | grep -E "\.python_packages|uvicorn" || true

      # Optioneel maar handig om te zien wat je deployt
      - name: Upload artifact (app.zip)
        uses: actions/upload-artifact@v4
        with:
          name: app-zip
          path: app.zip

      - name: Deploy to Azure Web App (Zip Deploy via Publish Profile)
        uses: azure/webapps-deploy@v3
        with:
          app-name: nen1090-api-prod
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: app.zip
